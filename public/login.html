<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sai Counsellors — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-orange-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg border border-orange-100 p-10 w-full max-w-sm">
    <div class="flex items-center gap-3 mb-8">
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-orange-500 text-white font-bold text-xl">S</span>
      <span class="font-bold text-gray-800 text-lg leading-tight">Sai Counsellors<br/>
        <span class="text-xs font-normal text-gray-400">Admin Dashboard</span>
      </span>
    </div>

    <div id="err" class="hidden mb-4 text-red-500 text-sm font-semibold">Invalid username or password.</div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Username</label>
        <input id="username" type="text" autofocus
          class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Password</label>
        <input id="password" type="password"
          class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
      </div>
      <button id="btn" onclick="login()"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-colors">
        Login
      </button>
    </div>
  </div>

  <script>
    async function login() {
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = 'Logging in…';
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.ok) {
        localStorage.setItem('sai_token', data.token);
        location.href = '/dashboard';
      } else {
        document.getElementById('err').classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Login';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
